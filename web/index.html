<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESRGAN Super Resolution</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 900px;
      padding: 3rem 1.5rem 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    header p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #94a3b8;
      max-width: 560px;
      margin-inline: auto;
    }

    .badges {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .badge {
      background: #1e1e2e;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .cta {
      margin-top: 2rem;
    }

    .cta a {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 0.8rem 2.2rem;
      border-radius: 10px;
      transition: opacity 0.2s;
    }

    .cta a:hover { opacity: 0.85; }

    .demo-frame {
      width: 100%;
      max-width: 1100px;
      padding: 1rem 1.5rem 2rem;
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 75vh;
      min-height: 540px;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #1e1e2e;
    }

    footer {
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #475569;
      text-align: center;
    }

    footer a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>🔬 ESRGAN Super Resolution</h1>
    <p>Upscale any image 4× using Enhanced Super-Resolution GANs — running live in your browser.</p>
    <div class="badges">
      <span class="badge">PyTorch</span>
      <span class="badge">RRDB · 23 blocks</span>
      <span class="badge">4× upscale</span>
      <span class="badge">CPU &amp; GPU</span>
    </div>
    <div class="cta">
      <a href="https://huggingface.co/spaces/YOUR_HF_USERNAME/esrgan-super-resolution" target="_blank" rel="noopener">
        Open Full Demo ↗
      </a>
    </div>
  </header>

  <section class="demo-frame">
    <iframe
      src="https://YOUR_HF_USERNAME-esrgan-super-resolution.hf.space"
      title="ESRGAN Super Resolution Demo"
      allow="accelerometer; camera; microphone"
      loading="lazy"
    ></iframe>
  </section>

  <footer>
    Built with <a href="https://github.com/xinntao/ESRGAN" target="_blank">ESRGAN</a> ·
    Hosted on <a href="https://huggingface.co/spaces" target="_blank">Hugging Face Spaces</a> ·
    <a href="https://github.com/Aakash-2010" target="_blank">GitHub</a>
  </footer>
</body>
</html>
